<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background-color: #e9e9e9;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        width: 500px;
        background: white;
        padding: 40px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
      }

      .logo {
        width: 280px;
        margin-bottom: 30px;
      }

      input {
        width: 100%;
        padding: 18px;
        margin-bottom: 20px;
        font-size: 18px;
        border: 1px solid #ccc;
        border-radius: 4px;
        outline: none;
      }

      input:focus {
        border-color: #00a6b2;
      }

      button {
        width: 100%;
        padding: 18px;
        border: none;
        background: #ec0066;
        color: white;
        font-size: 18px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.9;
      }

      .forgot {
        margin-top: 25px;
        font-size: 18px;
      }

      .signup {
        margin-top: 25px;
        font-size: 18px;
      }

      .signup a {
        text-decoration: none;
        color: black;
      }

      @media (max-width: 600px) {
        .container {
          width: 95%;
          padding: 25px;
        }

        input {
          padding: 14px;
          font-size: 16px;
        }

        button {
          padding: 14px;
          font-size: 16px;
        }

        .forgot,
        .signup {
          font-size: 14px;
        }

        .logo {
          max-width: 220px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="../Snapdeal/images/Snapdeal-Logo.wine.svg"
        alt="Snapdeal Logo"
        class="logo"
      />

      <form>
        <input type="email" placeholder="Email" />
        <input type="password" placeholder="Password" />

        <button type="submit">Login</button>
      </form>

      <p class="forgot">Forgot your password?</p>

      <p class="signup">
        Don't have an account?
        <a href="#"><b>Create account</b></a>
      </p>
    </div>
  </body>
</html>
