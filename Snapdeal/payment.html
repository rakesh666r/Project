<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Page</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #f7f7f7;
      }

      .wrapper {
        width: 780px;
        margin: 50px auto;
      }

      .navbarCNT {
        width: 100%;
        height: 72px;
        background: #e40046;
        color: white;
        display: flex;
        padding: 0px 20px;
        display: flex;
        align-items: center;
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        height: 24px;
        width: 712px;
      }

      .navbar p {
        font-size: 24px;
        line-height: 18px;
        font-weight: 700;
        font-family: Inter, lato, ubuntu, helvetica, sans-serif !important;

      }

      .container {
        width: 100%;
        height: 660px;
        display: flex;
        border: 1px solid red;
      }

      .leftSection {
        width: 52%;
        min-height: 585px;
        border-right: 1px solid #e5e5e5;
        position: relative;
        background: white;
      }

      .rightSection {
        width: 48%;
        min-height: 585px;
        background: white;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="navbarCNT">
        <div class="navbar">
          <p>snapdeal</p>
          <div style="display: flex; margin-left: 480px; gap: 12px;">
            <div>
              <span>English</span>
              <img
                src="./images/keyboard_arrow_down_16dp_FFFFFF_FILL0_wght300_GRAD0_opsz20.svg"
                alt=""
              />
            </div>
            <img
              style="background: rgba(255, 255, 255, 0.15)"
              src="./images/close_20dp_FFFFFF_FILL0_wght400_GRAD0_opsz20.svg"
              alt=""
            />
          </div>
        </div>
      </div>
      <div class="container">
        <!-- left side -->
        <div class="leftSection">
          <div>
            <span
              >Summary
              <img
                src="./images/keyboard_double_arrow_right_24dp_666666_FILL0_wght300_GRAD0_opsz40.svg"
                alt=""
              />
            </span>
            <span
              >Address
              <img
                src="./images/keyboard_double_arrow_right_24dp_666666_FILL0_wght300_GRAD0_opsz40.svg"
                alt=""
              />
            </span>
            <span>Payment</span>
          </div>
          <div>
            <div>
              <div>
                <img
                  src="./images/account_circle_24dp_666666_FILL0_wght400_GRAD0_opsz24.svg"
                  alt=""
                />
                <span>Contact Details</span>
              </div>
              <input type="text" />
              <div>
                <input type="text" />
                <span>Notify me with offers and updates</span>
              </div>
            </div>
            <div>
              Account
              <img
                src="./images/keyboard_arrow_up_16dp_000000_FILL0_wght300_GRAD0_opsz20.svg"
                alt=""
              />
            </div>
            <div>
              <span>₹ 167</span>
              <button>Continue</button>
            </div>
          </div>
        </div>

        <!-- right side -->
        <div class="rightSection">
          <div>
            <span>Order Summary</span>
            <img
              style="height: 56px; width: 56px"
              src="./images/Loopa-Black-Leather-Men-s-SDL344530276-1-bf880.jpg"
              alt=""
            />
            <div>
              <p>Loopa - Black Leather Men's...</p>
              <p>Qty: 1</p>
            </div>
            <span>₹167</span>
            <div>
              <div>Price</div>
              <div>₹167</div>
            </div>
          </div>
          <div>
            <span>Secured by</span>
            <img
              style="height: 26px; width: 26px"
              src="./images/razorpay-icon.svg"
              alt=""
            />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
