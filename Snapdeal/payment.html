<!doctype html>

    <title>Payment Page</title>

        align-items: center;
        height: 72px;
      }

      .navbar p {
        font-family: Inter, lato, ubuntu, helvetica, sans-serif !important;
        font-size: 24px;
        line-height: 18px;
        font-weight: 700;

      }
    </style>
